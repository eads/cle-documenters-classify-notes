name: Run Classifier

on:
  workflow_dispatch:
    inputs:
      year:
        description: "Year to fetch (e.g. 2026)"
        required: true
        default: "2026"
      month:
        description: "Month to fetch (e.g. March) — leave blank for full year"
        required: false
        default: ""

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  classify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Write service account credentials
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
        run: printf '%s' "$GOOGLE_APPLICATION_CREDENTIALS" > /tmp/credentials.json

      - name: Fetch docs
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/credentials.json
        run: |
          MONTH_FLAG=""
          if [ -n "${{ inputs.month }}" ]; then
            MONTH_FLAG="--month ${{ inputs.month }}"
          fi
          uv run documenters-cle-langchain fetch \
            --folder ${{ secrets.ROOT_DRIVE_FOLDER }} \
            --out /tmp/manifest.json \
            --year ${{ inputs.year }} \
            $MONTH_FLAG

      - name: Run pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/credentials.json
        run: |
          MONTH_FLAG=""
          if [ -n "${{ inputs.month }}" ]; then
            MONTH_FLAG="--month ${{ inputs.month }}"
          fi
          uv run documenters-cle-langchain pipeline \
            --manifest /tmp/manifest.json \
            --out /tmp/results.json \
            --sheet-id ${{ secrets.CLASSIFIER_OUTPUT_SHEET }} \
            --year ${{ inputs.year }} \
            $MONTH_FLAG
